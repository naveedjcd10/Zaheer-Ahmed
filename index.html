<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Police Record Verification</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f4f8;
      text-align: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      max-width: 400px;
      margin: auto;
      padding: 20px;
    }
    .logo {
      width: 120px;
    }
    h2 {
      color: #003366;
    }
    p {
      font-size: 16px;
      color: #333;
    }
    .label {
      font-weight: bold;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="sindh-police-logo.png" alt="Sindh Police Logo" class="logo">
    <h2>Police Record Verification System</h2>
    <p><span class="label">CRO Number:</span> 710/2026</p>
    <p><span class="label">Date of Issue:</span> 30/05/2026</p>
    <p><span class="label">Applicant Name:</span> Zaheer Ahmed</p>
    <p><span class="label">S/O, W/O, D/O:</span> Abdul Raheem</p>
    <p><span class="label">caste:</span> Khoso</p>
    <p><span class="label">Address:</span> Jacobabad</p>
    <p><span class="label">Remarks:</span> No Criminal record</p>
  </div>
</body>
</html>
